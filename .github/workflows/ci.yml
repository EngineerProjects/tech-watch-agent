name: CI

on:
  push:
    branches: [main, master, dev, 'feat/**', 'fix/**', 'chore/**', 'hotfix/**']
  pull_request:
    branches: [main, master, dev]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-dev-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-dev-

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: ruff check
        run: ruff check .

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: techwatch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/techwatch_test
      DATABASE_SYNC_URL: postgresql://postgres:postgres@localhost:5432/techwatch_test
      ADMIN_API_TOKEN: ci-test-token
      CONFIG_ENCRYPTION_KEY: ""
      LLM_API_KEY: ci-test-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest tests/ -v --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4

      - name: Prepare env file
        run: cp docker/env.docker .env

      - name: Start infrastructure
        run: |
          docker compose -f docker/docker-compose.yml up -d postgres redis searxng
          docker compose -f docker/docker-compose.yml ps

      - name: Wait for postgres
        run: |
          for i in $(seq 1 20); do
            docker compose -f docker/docker-compose.yml exec -T postgres \
              pg_isready -U techwatch -d techwatch && break
            echo "Waiting for postgres... ($i/20)"
            sleep 3
          done

      - name: Build and start API
        run: docker compose -f docker/docker-compose.yml up -d --build api

      - name: Health check
        run: |
          for attempt in $(seq 1 15); do
            if curl -fsS http://localhost:8000/health; then
              echo "API is healthy"
              exit 0
            fi
            echo "Waiting for API... ($attempt/15)"
            sleep 5
          done
          echo "--- API logs ---"
          docker compose -f docker/docker-compose.yml logs api
          exit 1

      - name: Stop services
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v --remove-orphans
