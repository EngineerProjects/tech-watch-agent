services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-techwatch}
      POSTGRES_USER: ${POSTGRES_USER:-techwatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-techwatch}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ../.volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-techwatch} -d ${POSTGRES_DB:-techwatch}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks:
      - tech-watch-network

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - ../.volumes/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - tech-watch-network

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
      - ../.volumes/searxng-cache:/var/cache/searxng
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://localhost:8080}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    restart: unless-stopped
    networks:
      - tech-watch-network

  ollama:
    image: ollama/ollama:latest
    profiles:
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - ../.volumes/ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - tech-watch-network

  ollama-init:
    image: ollama/ollama:latest
    profiles:
      - ollama
    depends_on:
      ollama:
        condition: service_started
    environment:
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - ../.volumes/ollama:/root/.ollama
      - ./ollama/pull-models.sh:/pull-models.sh:ro
    command: ["/bin/sh", "/pull-models.sh"]
    restart: "no"
    networks:
      - tech-watch-network

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        - PYTHON_VERSION=3.11
    image: tech-watch-agent:latest
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://techwatch:techwatch@postgres:5432/techwatch}
      DATABASE_SYNC_URL: ${DATABASE_SYNC_URL:-postgresql://techwatch:techwatch@postgres:5432/techwatch}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      searxng:
        condition: service_started
    volumes:
      - ../.volumes/logs:/app/logs
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: >
      sh -c "
        echo 'Running database migrations...' &&
        alembic upgrade head &&
        echo 'Starting API server...' &&
        python -m app.main --mode api
      "
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tech-watch-network

  once:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: tech-watch-agent:latest
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://techwatch:techwatch@postgres:5432/techwatch}
      DATABASE_SYNC_URL: ${DATABASE_SYNC_URL:-postgresql://techwatch:techwatch@postgres:5432/techwatch}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      searxng:
        condition: service_started
    volumes:
      - ../.volumes/logs:/app/logs
    command: >
      sh -c "
        alembic upgrade head &&
        python -m app.main --mode once --no-email
      "
    profiles:
      - manual
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tech-watch-network

  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: tech-watch-agent:latest
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://techwatch:techwatch@postgres:5432/techwatch}
      DATABASE_SYNC_URL: ${DATABASE_SYNC_URL:-postgresql://techwatch:techwatch@postgres:5432/techwatch}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      searxng:
        condition: service_started
    volumes:
      - ../.volumes/logs:/app/logs
    command: >
      sh -c "
        alembic upgrade head &&
        python -m app.main --mode schedule
      "
    profiles:
      - scheduler
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tech-watch-network

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - tech-watch-network
    restart: unless-stopped

networks:
  tech-watch-network:
    driver: bridge
