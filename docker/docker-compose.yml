services:
  # PostgreSQL database with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tech-watch-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: techwatch
      POSTGRES_INITDB_ARGS: "-c shared_preload_libraries=vector"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Redis for caching and task queue
  redis:
    image: redis:7-alpine
    container_name: tech-watch-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # FastAPI application server
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        - PYTHON_VERSION=3.11
    image: tech-watch-agent:latest
    container_name: tech-watch-api
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/techwatch
      DATABASE_SYNC_URL: postgresql://postgres:postgres@postgres:5432/techwatch
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - logs_data:/app/logs
      - ./credentials.json:/app/credentials.json:ro
      - ./token.json:/app/token.json
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: >
      sh -c "
        echo 'Running database migrations...' &&
        alembic upgrade head &&
        echo 'Starting API server...' &&
        python -m app.main --mode api
      "
    restart: unless-stopped
    networks:
      - tech-watch-network

  # One-time newsletter generation
  once:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: tech-watch-agent:latest
    container_name: tech-watch-once
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/techwatch
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - logs_data:/app/logs
      - ./credentials.json:/app/credentials.json:ro
      - ./token.json:/app/token.json
    command: >
      sh -c "
        alembic upgrade head &&
        python -m app.main --mode once --no-email
      "
    profiles:
      - manual
    networks:
      - tech-watch-network

  # Scheduled newsletter generation
  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: tech-watch-agent:latest
    container_name: tech-watch-scheduler
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/techwatch
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - logs_data:/app/logs
      - ./credentials.json:/app/credentials.json:ro
      - ./token.json:/app/token.json
    command: >
      sh -c "
        alembic upgrade head &&
        python -m app.main --mode schedule
      "
    profiles:
      - scheduler
    restart: unless-stopped
    networks:
      - tech-watch-network

volumes:
  postgres_data:
  redis_data:
  logs_data:

networks:
  tech-watch-network:
    driver: bridge