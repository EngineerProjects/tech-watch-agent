services:
  # Redis for caching and task queue
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - ../.volumes/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - tech-watch-network

  # FastAPI application server
  # DB: devinfra-postgres-1 at host port 5432 (user: dev / devpassword / db: techwatch)
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        - PYTHON_VERSION=3.11
    image: tech-watch-agent:latest
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://dev:devpassword@host.docker.internal:5432/techwatch
      DATABASE_SYNC_URL: postgresql://dev:devpassword@host.docker.internal:5432/techwatch
      REDIS_URL: redis://redis:6379
      SEARXNG_URL: http://host.docker.internal:8080
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../.volumes/logs:/app/logs
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: >
      sh -c "
        echo 'Running database migrations...' &&
        alembic upgrade head &&
        echo 'Starting API server...' &&
        python -m app.main --mode api
      "
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tech-watch-network

  # One-time newsletter generation (run with: make dev-once)
  once:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: tech-watch-agent:latest
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://dev:devpassword@host.docker.internal:5432/techwatch
      DATABASE_SYNC_URL: postgresql://dev:devpassword@host.docker.internal:5432/techwatch
      REDIS_URL: redis://redis:6379
      SEARXNG_URL: http://host.docker.internal:8080
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../.volumes/logs:/app/logs
    command: >
      sh -c "
        alembic upgrade head &&
        python -m app.main --mode once --no-email
      "
    profiles:
      - manual
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tech-watch-network

  # Scheduled newsletter generation (run with: make dev-scheduler)
  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: tech-watch-agent:latest
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://dev:devpassword@host.docker.internal:5432/techwatch
      DATABASE_SYNC_URL: postgresql://dev:devpassword@host.docker.internal:5432/techwatch
      REDIS_URL: redis://redis:6379
      SEARXNG_URL: http://host.docker.internal:8080
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../.volumes/logs:/app/logs
    command: >
      sh -c "
        alembic upgrade head &&
        python -m app.main --mode schedule
      "
    profiles:
      - scheduler
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tech-watch-network

  # React frontend served by nginx, proxies /api/* to the backend
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        # In this compose setup nginx proxies /api → backend, so VITE_API_URL
        # must point to the nginx /api prefix so the SPA uses relative-style calls.
        # For local dev outside Docker, override to http://localhost:8000.
        - VITE_API_URL=/api
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - tech-watch-network
    restart: unless-stopped

networks:
  tech-watch-network:
    driver: bridge
